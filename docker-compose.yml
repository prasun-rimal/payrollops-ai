services:
  database:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: payrollops
      POSTGRES_USER: payrollops
      POSTGRES_PASSWORD: payrollops
    ports:
      - "5432:5432"
    volumes:
      - payrollops-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payrollops"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://payrollops:payrollops@database:5432/payrollops
      AI_PROVIDER: mock
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  payrollops-data:

